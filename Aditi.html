<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aditi 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0008;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .scene {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* PHASE 1 - Tagline sequence */
  .tagline {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    font-style: italic;
    font-weight: 300;
    color: rgba(255,200,220,0);
    letter-spacing: 0.25em;
    text-align: center;
    width: 90%;
    transition: none;
    text-shadow: 0 0 30px rgba(255,120,160,0.6);
  }

  /* PHASE 2 - Main name */
  .main-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    opacity: 0;
  }

  .premium-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.6rem, 1.5vw, 0.9rem);
    letter-spacing: 0.6em;
    color: rgba(255, 180, 200, 0.7);
    text-transform: uppercase;
    font-weight: 300;
  }

  .name-aditi {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 18vw, 14rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #ff6b9d, #ff9ec4, #ffcfe0, #ff9ec4, #ff6b9d);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 3s ease infinite;
    line-height: 1;
    position: relative;
  }

  .name-aditi.glow-active {
    filter: drop-shadow(0 0 30px rgba(255,100,160,0.9))
            drop-shadow(0 0 60px rgba(255,100,160,0.6))
            drop-shadow(0 0 100px rgba(255,80,140,0.4));
    animation: gradientShift 2s ease infinite, nameGlow 1.5s ease-in-out infinite alternate;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes nameGlow {
    from {
      filter: drop-shadow(0 0 20px rgba(255,100,160,0.8))
              drop-shadow(0 0 50px rgba(255,100,160,0.5));
    }
    to {
      filter: drop-shadow(0 0 50px rgba(255,100,160,1))
              drop-shadow(0 0 100px rgba(255,100,160,0.8))
              drop-shadow(0 0 150px rgba(255,80,140,0.5));
    }
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,150,180,0.8), transparent);
    position: relative;
  }

  .divider::before, .divider::after {
    content: '♥';
    position: absolute;
    top: -8px;
    color: rgba(255,150,180,0.9);
    font-size: 10px;
  }
  .divider::before { left: calc(50% - 5px); }

  .final-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 2vw, 1.2rem);
    font-style: italic;
    color: rgba(255,200,220,0.85);
    letter-spacing: 0.15em;
    text-align: center;
  }

  /* Floating hearts */
  .heart-float {
    position: fixed;
    font-size: 1.2rem;
    animation: floatUp linear forwards;
    z-index: 2;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(0); opacity: 0; }
    10% { opacity: 1; transform: translateY(-20px) scale(1); }
    80% { opacity: 0.7; }
    100% { transform: translateY(-80vh) scale(0.3); opacity: 0; }
  }

  /* Rose petals */
  .petal {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50% 0 50% 0;
    background: rgba(255, 100, 140, 0.6);
    animation: petalFall linear forwards;
    z-index: 1;
  }

  @keyframes petalFall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="scene">
  <!-- Taglines shown one by one -->
  <div class="tagline" id="tag1">You make the world more beautiful... 🌸</div>
  <div class="tagline" id="tag2">Every smile of yours is pure magic ✨</div>
  <div class="tagline" id="tag3">You are gorgeous, inside & out 💖</div>
  <div class="tagline" id="tag4">You are my favourite person in the world 🌹</div>

  <!-- Main Name Stage -->
  <div class="main-stage" id="mainStage">
    <div class="premium-label">✦ &nbsp; P R E M I U M &nbsp; ✦</div>
    <div class="name-aditi" id="aditiName">ADITI</div>
    <div class="divider"></div>
    <div class="final-line">My heart found its home in you 💕</div>
  </div>
</div>

<script>
// ---- PARTICLE CANVAS BG ----
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    alpha: Math.random() * 0.6 + 0.1,
    speed: Math.random() * 0.3 + 0.1,
    twinkle: Math.random() * Math.PI * 2
  });
}

function drawBg(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Deep gradient bg
  const grad = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 0,
    canvas.width/2, canvas.height/2, canvas.width * 0.8
  );
  grad.addColorStop(0, '#1a0015');
  grad.addColorStop(0.5, '#0d0010');
  grad.addColorStop(1, '#050005');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Soft glow center
  const glow = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 0,
    canvas.width/2, canvas.height/2, 300
  );
  glow.addColorStop(0, 'rgba(180,40,100,0.12)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  particles.forEach(p => {
    p.twinkle += 0.02;
    const a = p.alpha * (0.5 + 0.5 * Math.sin(p.twinkle));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 200, 220, ${a})`;
    ctx.fill();
    p.y -= p.speed * 0.3;
    if (p.y < -5) p.y = canvas.height + 5;
  });
}

function loop(t) {
  drawBg(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);


// ---- TIMELINE CONTROLLER ----
function fadeIn(el, duration=1200) {
  return new Promise(res => {
    el.style.transition = `color ${duration}ms ease, opacity ${duration}ms ease`;
    el.style.color = 'rgba(255,200,220,0.95)';
    el.style.opacity = '1';
    setTimeout(res, duration);
  });
}

function fadeOut(el, duration=800) {
  return new Promise(res => {
    el.style.transition = `color ${duration}ms ease, opacity ${duration}ms ease`;
    el.style.color = 'rgba(255,200,220,0)';
    el.style.opacity = '0';
    setTimeout(res, duration);
  });
}

function wait(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// Spawn hearts
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = ['💕','💖','🌹','💗','✨','🌸'][Math.floor(Math.random()*6)];
  h.style.left = Math.random() * 90 + 5 + 'vw';
  h.style.bottom = '0';
  h.style.animationDuration = (4 + Math.random() * 4) + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 8000);
}

// Spawn petals
function spawnPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.top = '-10px';
  p.style.animationDuration = (5 + Math.random() * 5) + 's';
  p.style.background = `rgba(${200+Math.random()*55}, ${60+Math.random()*60}, ${100+Math.random()*60}, 0.5)`;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 10000);
}

let heartInterval, petalInterval;

async function runShow() {
  const tags = ['tag1','tag2','tag3','tag4'].map(id => document.getElementById(id));
  const mainStage = document.getElementById('mainStage');
  const aditiName = document.getElementById('aditiName');

  // Start petals early
  petalInterval = setInterval(spawnPetal, 400);

  // Show each tagline
  for (let i = 0; i < tags.length; i++) {
    await wait(300);
    await fadeIn(tags[i], 1000);
    await wait(2200);
    await fadeOut(tags[i], 700);
    await wait(300);
  }

  // Start hearts
  heartInterval = setInterval(spawnHeart, 350);

  // Show main name
  await wait(400);
  mainStage.style.transition = 'opacity 1.8s ease';
  mainStage.style.opacity = '1';

  await wait(2000);
  aditiName.classList.add('glow-active');

  // Keep glowing till end
  await wait(5000);
  clearInterval(heartInterval);
  clearInterval(petalInterval);

  // Restart after a pause
  await wait(2000);
  location.reload();
}

window.addEventListener('load', () => {
  setTimeout(runShow, 500);
});
</script>
</body>
</html>
